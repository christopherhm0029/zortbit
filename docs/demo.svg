<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="otto" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3ad2c4"/><stop offset="1" stop-color="#1f9fd1"/>
    </linearGradient>
    <radialGradient id="b1" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffc7bd" stop-opacity="0.95"/><stop offset="1" stop-color="#ffc7bd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#c2d2ff" stop-opacity="0.95"/><stop offset="1" stop-color="#c2d2ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b3" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#b6ead2" stop-opacity="0.95"/><stop offset="1" stop-color="#b6ead2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b4" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#dcc8f2" stop-opacity="0.9"/><stop offset="1" stop-color="#dcc8f2" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="#243049" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- aurora background -->
  <rect x="0" y="0" width="1200" height="820" fill="#eef1f6"/>
  <circle cx="150" cy="60" r="540" fill="url(#b1)"/>
  <circle cx="1080" cy="80" r="600" fill="url(#b2)"/>
  <circle cx="160" cy="800" r="560" fill="url(#b3)"/>
  <circle cx="1070" cy="820" r="600" fill="url(#b4)"/>

  <!-- headline -->
  <text x="600" y="92" text-anchor="middle" font-size="46" font-weight="700" fill="#14283a">Your own AI for your own mess.</text>
  <text x="600" y="138" text-anchor="middle" font-size="22" fill="#5b6675">It learns how <tspan font-style="italic">you</tspan> file things — and does it 100% on your Mac.</text>

  <!-- app card -->
  <rect x="280" y="176" width="640" height="558" rx="28" fill="#ffffff" stroke="#eceef2" stroke-width="1" filter="url(#soft)"/>

  <!-- header -->
  <g transform="translate(304,196) scale(0.84)">
    <line x1="32" y1="13" x2="32" y2="6" stroke="#16a89f" stroke-width="2.6" stroke-linecap="round"/>
    <circle cx="32" cy="4.4" r="3.2" fill="#34d399"/>
    <rect x="7" y="13" width="50" height="46" rx="17" fill="url(#otto)"/>
    <rect x="13" y="22" width="38" height="29" rx="13" fill="#0e5e64"/>
    <rect x="20" y="30" width="9" height="12" rx="4.5" fill="#fff"/>
    <rect x="35" y="30" width="9" height="12" rx="4.5" fill="#fff"/>
    <path d="M25 45.5 Q32 49.5 39 45.5" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
  </g>
  <text x="372" y="224" font-size="25" font-weight="700" fill="#14283a">Zortbit</text>
  <text x="372" y="248" font-size="14.5" fill="#8a93a0">Tidying 4 files · review</text>
  <rect x="772" y="205" width="124" height="30" rx="15" fill="#dff3e6"/>
  <path d="M789 213 C789 226 800 228 803 215 C798 215 791 217 789 213 Z" fill="#2f9e5e"/>
  <text x="810" y="225" font-size="14" font-weight="600" fill="#1a7f4b">Gentle · 3%</text>

  <!-- row 1 -->
  <rect x="304" y="268" width="592" height="106" rx="14" fill="#f6f7f9"/>
  <g transform="translate(322,296)">
    <rect x="0" y="0" width="26" height="33" rx="4" fill="#fdeaea" stroke="#e5484d" stroke-width="1.6"/>
    <rect x="5" y="8" width="16" height="2.4" rx="1.2" fill="#e5484d"/>
    <rect x="5" y="14" width="16" height="2.4" rx="1.2" fill="#e5484d"/>
    <rect x="5" y="20" width="11" height="2.4" rx="1.2" fill="#e5484d"/>
  </g>
  <text x="366" y="298" font-size="14.5" fill="#9aa3ad" text-decoration="line-through">Scan_2026_03_18 (1).pdf</text>
  <text x="366" y="325" font-size="19" font-weight="600" fill="#14283a">&#8594;  acme-invoice-march-2026.pdf</text>
  <rect x="366" y="341" width="150" height="26" rx="7" fill="#d6f1e8"/>
  <text x="379" y="359" font-size="13" font-weight="600" fill="#0a8c61">Finance / Invoices</text>
  <text x="528" y="359" font-size="13" fill="#5b6675">reads like an invoice — vendor, totals, due date</text>

  <!-- row 2 -->
  <rect x="304" y="388" width="592" height="90" rx="14" fill="#f6f7f9"/>
  <g transform="translate(322,410)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="#eef2f7" stroke="#9aa6b5" stroke-width="1.6"/>
    <circle cx="9" cy="9" r="3" fill="#f2b94b"/>
    <path d="M3 25 L11 16 L17 22 L21 18 L25 25 Z" fill="#7d93a8"/>
  </g>
  <text x="366" y="412" font-size="14.5" fill="#9aa3ad" text-decoration="line-through">Screenshot 2026-03-12 at 09.41.png</text>
  <text x="366" y="439" font-size="19" font-weight="600" fill="#14283a">&#8594;  checkout-error-500.png</text>
  <rect x="366" y="455" width="150" height="26" rx="7" fill="#e3e9fb"/>
  <g transform="translate(378,462)"><path d="M0 6 Q9 -1 18 6 Q9 13 0 6 Z" fill="none" stroke="#5a43b8" stroke-width="1.6"/><circle cx="9" cy="6" r="2.6" fill="#5a43b8"/></g>
  <text x="402" y="473" font-size="13" font-weight="600" fill="#5a43b8">read the screen</text>
  <rect x="524" y="455" width="74" height="26" rx="7" fill="#d6f1e8"/>
  <text x="536" y="473" font-size="13" font-weight="600" fill="#0a8c61">Design</text>

  <!-- row 3 -->
  <rect x="304" y="492" width="592" height="90" rx="14" fill="#f6f7f9"/>
  <g transform="translate(322,514)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="#eef2f7" stroke="#9aa6b5" stroke-width="1.6"/>
    <polyline points="4,21 11,13 16,17 24,7" fill="none" stroke="#5a8f6e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="24" cy="7" r="2" fill="#5a8f6e"/>
  </g>
  <text x="366" y="516" font-size="14.5" fill="#9aa3ad" text-decoration="line-through">doc final FINAL v2 (3).docx</text>
  <text x="366" y="543" font-size="19" font-weight="600" fill="#14283a">&#8594;  q1-board-summary.docx</text>
  <rect x="366" y="559" width="66" height="26" rx="7" fill="#d6f1e8"/>
  <text x="378" y="577" font-size="13" font-weight="600" fill="#0a8c61">Work</text>
  <text x="444" y="577" font-size="13" fill="#5b6675">learned: you file board decks here</text>

  <!-- quarantine -->
  <rect x="304" y="596" width="592" height="112" rx="14" fill="#fdf6e2" stroke="#efe2b4" stroke-width="1"/>
  <g transform="translate(326,628)" stroke="#c79a1e" stroke-width="2.2" fill="none">
    <rect x="2" y="13" width="22" height="16" rx="4" fill="#f2d98a"/>
    <path d="M7 13 V9 a6 6 0 0 1 12 0 V13"/>
    <circle cx="13" cy="20" r="2.2" fill="#c79a1e" stroke="none"/>
  </g>
  <text x="366" y="626" font-size="15.5" font-weight="700" fill="#9a7b14">client_secret… .json — quarantined, never sent to a model</text>
  <text x="366" y="652" font-size="13.5" fill="#7c6f49">Sensitive files are kept local for your review. Nothing is</text>
  <text x="366" y="673" font-size="13.5" fill="#7c6f49">ever deleted — Trash only, with Undo.</text>

  <!-- chips -->
  <g font-size="15" font-weight="600">
    <rect x="136" y="746" width="200" height="40" rx="20" fill="#ffffff" opacity="0.92" stroke="#dfe3ea"/>
    <g transform="translate(152,758)" stroke="#0a8c61" stroke-width="1.5" fill="none">
      <rect x="2" y="2" width="13" height="13" rx="3"/><rect x="6" y="6" width="5" height="5" rx="1.2" fill="#0a8c61" stroke="none"/>
      <line x1="0" y1="6" x2="2" y2="6"/><line x1="0" y1="11" x2="2" y2="11"/><line x1="15" y1="6" x2="17" y2="6"/><line x1="15" y1="11" x2="17" y2="11"/>
      <line x1="6" y1="0" x2="6" y2="2"/><line x1="11" y1="0" x2="11" y2="2"/><line x1="6" y1="15" x2="6" y2="17"/><line x1="11" y1="15" x2="11" y2="17"/>
    </g>
    <text x="180" y="771" fill="#0a8c61">100% on-device</text>

    <rect x="352" y="746" width="196" height="40" rx="20" fill="#ffffff" opacity="0.92" stroke="#dfe3ea"/>
    <path d="M377 756 L379 762 L385 764 L379 766 L377 772 L375 766 L369 764 L375 762 Z" fill="#6a4fd0"/>
    <text x="396" y="771" fill="#4a43b8">learns your filing</text>

    <rect x="564" y="746" width="232" height="40" rx="20" fill="#ffffff" opacity="0.92" stroke="#dfe3ea"/>
    <g transform="translate(580,758)"><path d="M0 6 Q9 -2 18 6 Q9 14 0 6 Z" fill="none" stroke="#1380ad" stroke-width="1.7"/><circle cx="9" cy="6" r="2.8" fill="#1380ad"/></g>
    <text x="606" y="771" fill="#1380ad">reads inside files (OCR)</text>

    <rect x="812" y="746" width="252" height="40" rx="20" fill="#ffffff" opacity="0.92" stroke="#dfe3ea"/>
    <g transform="translate(828,756)" fill="none" stroke="#15a98e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 4 L2 10 L8 10"/><path d="M2 10 a8 8 0 1 0 3 -6"/>
    </g>
    <text x="856" y="771" fill="#15a98e">never deletes · always Undo</text>
  </g>

  <text x="600" y="808" text-anchor="middle" font-size="14" fill="#8a93a0">Zortbit — a tiny menu-bar app · built in Rust + Tauri · your files never leave your Mac</text>
</svg>
